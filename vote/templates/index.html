<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{option_a}} vs {{option_b}}!</title>
    <base href="/index.html">
    <meta name = "viewport" content = "width=device-width, initial-scale = 1.0">
    <meta name="keywords" content="docker-compose, docker, stack">
    <meta name="author" content="Tutum dev team">
    <link rel='stylesheet' href="{{ url_for('static',filename='stylesheets/style.css') }}" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
  </head>
  <body>
    <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
    <div id="content-container">
      <div id="content-container-center">
        <h3>{{option_a}} vs {{option_b}}!</h3>
        <form id="choice" name='form' method="POST" action="/">
          <button id="a" type="submit" name="vote" class="a" value="a">{{option_a}}</button>
          <button id="b" type="submit" name="vote" class="b" value="b">{{option_b}}</button>
        </form>
        <div id="tip">
          (Tip: you can change your vote)
        </div>
        <div id="hostname">
          Processed by container ID {{hostname}}
        </div>
      </div>
    </div>
    <script src="http://code.jquery.com/jquery-latest.min.js" type="text/javascript"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.js"></script>

    {% if vote %}
    <script>
      var vote = "{{vote}}";

      if(vote == "a"){
        $(".a").prop('disabled', true);
        $(".a").html('{{option_a}} <i class="fa fa-check-circle"></i>');
        $(".b").css('opacity','0.5');
      }
      if(vote == "b"){
        $(".b").prop('disabled', true);
        $(".b").html('{{option_b}} <i class="fa fa-check-circle"></i>');
        $(".a").css('opacity','0.5');
      }
    </script>
    {% endif %}

    <script>
      (function() {
        var toggle = document.getElementById('theme-toggle');
        var body = document.body;

        function applyTheme(theme) {
          if (theme === 'dark') {
            body.classList.add('dark');
            toggle.textContent = '☀️';
            toggle.setAttribute('aria-label', 'Switch to light mode');
          } else {
            body.classList.remove('dark');
            toggle.textContent = '🌙';
            toggle.setAttribute('aria-label', 'Switch to dark mode');
          }
        }

        var saved = localStorage.getItem('theme');
        if (saved) {
          applyTheme(saved);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          applyTheme('dark');
        }

        toggle.addEventListener('click', function() {
          var isDark = body.classList.contains('dark');
          var next = isDark ? 'light' : 'dark';
          localStorage.setItem('theme', next);
          applyTheme(next);
        });
      })();
    </script>
  </body>
</html>
