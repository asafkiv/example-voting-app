<!DOCTYPE html>
<html ng-app="usavsfrance">
  <head>
    <meta charset="utf-8">
    <title>USA vs France -- Result</title>
    <base href="/index.html">
    <meta name = "viewport" content = "width=device-width, initial-scale = 1.0">
    <meta name="keywords" content="docker-compose, docker, stack">
    <meta name="author" content="Docker">
    <link rel='stylesheet' href='/stylesheets/style.css' />
  </head>
  <body ng-controller="statsCtrl" >
    <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
     <div id="background-stats">
       <div id="background-stats-1">
       </div><!--
      --><div id="background-stats-2">
      </div>
    </div>
    <div id="content-container">
      <div id="content-container-center">
        <div id="choice">
          <div class="choice cats">
            <div class="label">USA</div>
            <div class="stat">{{aPercent | number:1}}%</div>
          </div>
          <div class="divider"></div>
          <div class="choice dogs">
            <div class="label">France</div>
            <div class="stat">{{bPercent | number:1}}%</div>
          </div>
        </div>
      </div>
    </div>
    <div id="result">
      <span ng-if="total == 0">No votes yet</span>
      <span ng-if="total == 1">{{total}} vote</span>
      <span ng-if="total >= 2">{{total}} votes</span>
    </div>
    <script src="socket.io.js"></script>
    <script src="angular.min.js"></script>
    <script src="app.js"></script>
    <script>
      (function() {
        var toggle = document.getElementById('theme-toggle');
        var body = document.body;

        function applyTheme(theme) {
          if (theme === 'dark') {
            body.classList.add('dark');
            toggle.textContent = '☀️';
            toggle.setAttribute('aria-label', 'Switch to light mode');
          } else {
            body.classList.remove('dark');
            toggle.textContent = '🌙';
            toggle.setAttribute('aria-label', 'Switch to dark mode');
          }
        }

        var saved = localStorage.getItem('theme');
        if (saved) {
          applyTheme(saved);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          applyTheme('dark');
        }

        toggle.addEventListener('click', function() {
          var isDark = body.classList.contains('dark');
          var next = isDark ? 'light' : 'dark';
          localStorage.setItem('theme', next);
          applyTheme(next);
        });
      })();
    </script>
  </body>
</html>
